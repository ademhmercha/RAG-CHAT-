version: "3.9"

services:
  app:
    build: .
    container_name: rag-app
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - mongo
      - chroma
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: rag-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo-data:
  chroma-data:
